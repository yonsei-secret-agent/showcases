experiment:
  name: who_when_native_runtime_card_poc
  seed: ${EXPERIMENT_SEED}

paths:
  who_when_repo: ${WHO_WHEN_REPO_PATH}
  data_dir: ${DATA_DIR}
  reports_dir: ${REPORTS_DIR}

phases:
  phase0_data_audit: true
  phase0_method_reproduction: false
  pre_phase2_recurrence_pretest: true
  phase2a_gold_intervention_repair: true
  phase2b_predicted_intervention_repair: false
  phase3_cross_trace_transfer: false
  phase4_replayable_subset_rescue: false

smoke:
  candidate_cases: 20
  no_guidance_repeats: 3
  failure_prone_recurrence_threshold: 0.4
  main_cases: 12
  stratify_by_failure_mode: true
  candidate_filter:
    dataset_type: algorithm_generated
    min_mistake_step: 2
    phase2a_status: candidate
    include_warnings: false
    max_history_len: 10
  conditions:
    - no_guidance
    - coarse_reflection
    - broad_verification_card
    - sanitized_raw_gold_explanation
    - oracle_specific_card
    - hard_mismatched_card
